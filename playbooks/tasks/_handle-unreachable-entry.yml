---
# Per-entry branch logic for the controller-side force path. Invoked
# once per `github_runners_config` entry whose `vmName` failed the
# reachability probe in play 1 of deregister-runners.yml.
#
# Three outcomes:
#
#   GitHub knows this runner & runners_force_remove=true
#     -> DELETE .../actions/runners/{runner_id} controller-side, so an
#        unreachable VM does not leave a phantom self-hosted runner
#        attached to the repo.
#   GitHub knows this runner & runners_force_remove=false
#     -> append "vmName/runnerName" to runners_unreachable_errors. The
#        final localhost play asserts the list is empty, surfacing the
#        accumulated failures as one non-zero exit code rather than
#        bailing on the first one.
#   GitHub does not know this runner
#     -> silently skip. Nothing to deregister; the per-VM play would
#        have no-opped too, and the on-disk directory will go when
#        the VM comes back (or stays orphaned, which is harmless).
#
# Probe reuse: include_role with tasks_from: _probe-github runs the
# same shared probe runner_registration's remove direction uses. Two
# benefits over inlining a parallel uri call: (a) one place to evolve
# the GitHub contract (URL shape, auth header, no_log posture), and
# (b) the boolean fact name (`runner_registration_on_github`) and the
# response register (`runner_registration_runners_resp`) match what
# the role-side branches read, so a regression caught in molecule is
# the same regression this path takes.

- name: Probe GitHub for this unreachable entry's registration
  ansible.builtin.include_role:
    name: runner_registration
    tasks_from: _probe-github

- name: Force-remove the runner via the GitHub API
  ansible.builtin.uri:
    # Owner / repo facts are populated by the include above
    # (_probe-github.yml's first set_fact); reused here so the URL
    # parse lives in exactly one place.
    url: >-
      {{ github_api_base_url }}/repos/{{ runner_registration_entry_owner
      }}/{{ runner_registration_entry_repo }}/actions/runners/{{
        (runner_registration_runners_resp.json.runners
          | selectattr('name', 'equalto', entry.runnerName)
          | first).id
      }}
    method: DELETE
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    # 204 is the documented GitHub success code; 200 covers older
    # API surfaces; 404 collapses the race where the runner was
    # already gone (still success from the operator's point of view).
    status_code: [200, 204, 404]
  no_log: true
  when:
    - runner_registration_on_github
    - runners_force_remove | default(false) | bool

- name: Record the unreachable-with-registration entry for the end-of-run assert
  ansible.builtin.set_fact:
    runners_unreachable_errors: >-
      {{ runners_unreachable_errors
         + [entry.vmName ~ '/' ~ entry.runnerName] }}
  when:
    - runner_registration_on_github
    - not (runners_force_remove | default(false) | bool)
