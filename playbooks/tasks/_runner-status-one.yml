---
# Per-runner status probe, included once per vm_runner_entries item
# (loop_var: entry) by playbooks/runner-status.yml. Appends one verdict dict
# to runner_status_results. Read-only - every task is changed_when: false /
# a read.
#
# Two independent signals make a runner "up":
#   service_active  - the on-VM systemd unit is `active` (the runner's
#                     Runner.Listener process is running). ignore_unreachable
#                     keeps a down VM from aborting the host: the probe then
#                     reports no unit, which reads as inactive -> DOWN.
#   github_status   - GitHub's view of the runner (online / offline / busy),
#                     queried controller-side (delegate_to: localhost) since
#                     the VM has no GitHub egress of its own. 'absent' when
#                     GitHub does not know the runner; 'query-failed-http-N'
#                     when the API call itself failed (surfaced, not hidden,
#                     even though the task is no_log for the PAT).
#
# A third signal is recorded for diagnosis only - it does NOT change the
# UP/DOWN verdict:
#   egress_reachable - whether the VM itself can reach GitHub. The
#                     github_status query runs controller-side, so it is
#                     blind to the VM's own egress: a runner that reads
#                     [service=active, github=offline] is offline because the
#                     listener cannot hold its session, and the usual cause is
#                     the VM having no path out (router / DNS) rather than a
#                     stale listener. Probed from the VM (no delegate), HEAD
#                     with a short timeout, never fatal. Egress is a host
#                     property, so it is probed once per host and cached, not
#                     re-probed for every runner the loop visits.

- name: Find the runner systemd unit (per runner)
  ansible.builtin.shell: >-
    set -o pipefail;
    { systemctl list-unit-files --type=service --no-pager --no-legend
    'actions.runner.*{{ entry.runnerName }}.service' || true; }
    | awk 'NR==1 { print $1; exit }'
  args:
    executable: /bin/bash
  register: runner_status_unit
  changed_when: false
  ignore_unreachable: true
  # noqa command-instead-of-shell - the pipe to awk is the contract

# `systemctl is-active` observes the unit's live state; the systemd module
# manages desired state and cannot report current active-status without
# making a change a read-only probe must not make - hence command + the noqa.
- name: Check whether the unit is active (per runner)  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "systemctl is-active {{ runner_status_unit.stdout }}"
  register: runner_status_active
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (runner_status_unit.unreachable | default(false))
    - (runner_status_unit.stdout | default('')) | length > 0

- name: Parse owner/repo from githubUrl (per runner)
  ansible.builtin.set_fact:
    runner_status_repo: >-
      {{ entry.githubUrl | urlsplit('path') | regex_replace('^/', '')
         | regex_replace('\.git$', '') }}

- name: Query GitHub for this runner's online state
  ansible.builtin.uri:
    # github_api_base_url defaults to the public API here: it is a
    # roles/runner_registration default that the bridge does not export as an
    # extra-var, and this play is not inside that role, so its default is not
    # in scope. The molecule scenario sets it explicitly to the mock.
    url: >-
      {{ github_api_base_url | default('https://api.github.com')
      }}/repos/{{ runner_status_repo }}/actions/runners?per_page=100
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
  delegate_to: localhost
  register: runner_status_gh
  no_log: true
  # Non-200 is folded into the verdict (github_status below) rather than
  # aborting, so one repo's auth/rate problem still reports the rest.
  failed_when: false

# Egress probe - host-level, computed once and cached in
# runner_status_egress_reachable. Runs on the VM (no delegate_to) so it
# measures the VM's own path out, which the controller-side github_status
# query cannot see. HEAD against the GitHub API root: any HTTP response
# (200/301/401/403/404) proves DNS + routing + TLS worked; a connect
# timeout or DNS failure leaves uri's status at -1, which reads as
# unreachable. failed_when/ignore_unreachable keep it from ever aborting
# the read-only report. The `when` guard makes it fire on the first runner
# of the host only; later iterations reuse the cached fact.
- name: Probe the VM's egress to GitHub (once per host)
  ansible.builtin.uri:
    url: "{{ runner_egress_probe_url | default('https://api.github.com') }}"
    method: HEAD
    timeout: 10
    status_code: [200, 301, 302, 401, 403, 404]
  register: runner_status_egress_probe
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when: runner_status_egress_reachable is not defined

- name: Cache the host's egress verdict (once)
  ansible.builtin.set_fact:
    runner_status_egress_reachable: >-
      {{ (runner_status_egress_probe.status | default(-1) | int) > 0 }}
  when: runner_status_egress_reachable is not defined

- name: Record this runner's status verdict
  vars:
    # The matching runner object from the GitHub response, or {} when GitHub
    # does not list it / the call failed.
    gh_runner: >-
      {{ (runner_status_gh.json.runners | default([])
          | selectattr('name', 'equalto', entry.runnerName)
          | list | first) | default({}) }}
    gh_failed: "{{ (runner_status_gh.status | default(0)) != 200 }}"
    svc_active: "{{ (runner_status_active.stdout | default('')) == 'active' }}"
    gh_status: >-
      {{ (gh_failed | bool)
         | ternary('query-failed-http-' ~ (runner_status_gh.status | default('error')),
                   gh_runner.status | default('absent')) }}
  ansible.builtin.set_fact:
    runner_status_results: >-
      {{ runner_status_results + [{
           'vm': inventory_hostname,
           'runner': entry.runnerName,
           'service_active': (svc_active | bool),
           'github_status': gh_status,
           'github_busy': (gh_runner.busy | default(false) | bool),
           'egress_reachable': (runner_status_egress_reachable | default(false) | bool),
         }] }}
