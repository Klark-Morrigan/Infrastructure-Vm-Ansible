---
# Fixture inventory for test-deregister-runners-playbook.yml.
#
# Two VM-named hosts so play 1's `wait_for_connection` per-vmName loop
# resolves both probes from inventory; the per-VM play (play 2) targets
# `hosts: vm_provisioner_hosts` which is deliberately empty here so the
# smoke playbook can exercise plays 1 and 3 end-to-end without ssh.
# Per-role behaviour is already covered by the role-level molecule
# scenarios; this smoke test owns the play-level wiring.
#
# - reachable-vm uses ansible_connection=local so wait_for_connection
#   succeeds against the controller itself (the loopback gives the
#   probe a real TCP target without needing a second host).
# - unreachable-vm points at TEST-NET-1 (RFC 5737) with a 2-second TCP
#   connect timeout: every kernel routes the prefix as black-hole-ish
#   so the probe fails inside the play's outer 10-second window even
#   in CI environments where outbound is heavily filtered.
all:
  hosts:
    reachable-vm:
      ansible_connection: local
    unreachable-vm:
      ansible_host: 192.0.2.1
      ansible_user: nobody
      ansible_connection: ssh
      ansible_ssh_common_args: >-
        -o ConnectTimeout=2
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o BatchMode=yes
  children:
    vm_provisioner_hosts:
      hosts: {}
