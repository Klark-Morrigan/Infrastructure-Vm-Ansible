---
# Controller-only smoke test for playbooks/deregister-runners.yml.
#
# What it owns:
#   - structural: three plays in the right order; the per-VM play
#     tags runner_service / runner_registration / runner_binary.
#   - behavioural: with one reachable and one unreachable VM, both
#     entries registered on a mocked GitHub:
#       * `runners_force_remove=false` -> play 3's assert fires; the
#         force-path DELETE was NOT issued.
#       * `runners_force_remove=true`  -> play 3's assert passes; the
#         force-path DELETE was issued for the unreachable entry.
#
# What it deliberately does NOT own: the per-VM remove path. Play 2's
# `hosts: vm_provisioner_hosts` is empty in the fixture inventory, so
# the play runs against zero hosts. Per-role remove behaviour is
# covered by the molecule scenarios under
# Tests/molecule/runner_*/remove/; this smoke test stays scoped to the
# playbook glue (controller-side reachability split, force fan-out,
# end-of-run assert) so a regression here lands in exactly the file
# the assertion points at.
#
# Shape: this test playbook drives the production playbook as a
# subprocess (`ansible.builtin.command`) rather than `import_playbook`-
# ing it, because we need to run it twice with different extra-vars,
# capture its exit code under failure conditions, and parse its stdout
# for the assert's fail_msg. import_playbook is static at parse time
# and cannot do any of that. The block / always wrapper guarantees
# the mock teardown runs even when an assertion fails mid-test.

- name: Smoke-test the deregister-runners playbook
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    target_playbook: "{{ repo_root }}/playbooks/deregister-runners.yml"
    inventory_path: "{{ playbook_dir }}/inventory.yml"
    mock_port: 18091
    workspace: "/tmp/deregister-runners-smoke"
    mock_log: "{{ workspace }}/mock.log"
    mock_registered: "{{ workspace }}/registered"
    mock_pidfile: "{{ workspace }}/mock.pid"
    extra_vars_path: "{{ workspace }}/extra-vars.json"
    # Two entries on two vmNames so the reachability split has a
    # representative case for each branch. Both runner names land
    # in the mock's registered file so both probes return "on
    # GitHub"; only the unreachable VM's entry should reach the
    # force-or-error decision in play 1.
    runners_fixture:
      - vmName: reachable-vm
        runnerName: runner-on-reachable
        runnerUsername: gh-runner-a
        githubUrl: https://github.com/example-org/example-repo
      - vmName: unreachable-vm
        runnerName: runner-on-unreachable
        runnerUsername: gh-runner-b
        githubUrl: https://github.com/example-org/example-repo

  tasks:
    - name: Run smoke test under teardown guard
      # ANSIBLE_ROLES_PATH mirrors the bridge's _ansible-env.sh export:
      # the repo's ansible.cfg is silently ignored on /mnt/c drvfs
      # (world-writable safety check), so every nested ansible-playbook
      # invocation must set roles_path via env. HOST_KEY_CHECKING off
      # prevents an unknown-host prompt against the unreachable fixture
      # host wedging the test under a TTY.
      environment:
        ANSIBLE_ROLES_PATH: "{{ repo_root }}/roles"
        ANSIBLE_HOST_KEY_CHECKING: "False"
      block:
        - name: Create mock workspace
          ansible.builtin.file:
            path: "{{ workspace }}"
            state: directory
            mode: "0700"

        # One entry per line; the mock assigns sequential ids
        # starting at 1, so runner-on-reachable -> id 1 and
        # runner-on-unreachable -> id 2. The DELETE-path assertion
        # below pins on id 2.
        - name: Seed the mock's registered-runners file
          ansible.builtin.copy:
            dest: "{{ mock_registered }}"
            content: |
              runner-on-reachable
              runner-on-unreachable
            mode: "0644"

        - name: Start the mock GitHub API in the background
          # Shared mock (Tests/mock-github-api.py) is the single
          # source for every runner-side test: both molecule
          # scenarios under Tests/molecule/runner_registration/ and
          # this smoke playbook. The path is relative to playbook_dir
          # (Tests/ansible/), so one level up to Tests/.
          ansible.builtin.shell: |
            set -euo pipefail
            nohup python3 {{ playbook_dir | quote }}/../mock-github-api.py \
                --port {{ mock_port }} \
                --log {{ mock_log | quote }} \
                --registered-file {{ mock_registered | quote }} \
                >/dev/null 2>&1 &
            echo $! > {{ mock_pidfile | quote }}
          args:
            executable: /bin/bash
          changed_when: true

        - name: Wait for the mock to bind 127.0.0.1
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: "{{ mock_port }}"
            timeout: 5

        - name: Write the extra-vars file
          ansible.builtin.copy:
            dest: "{{ extra_vars_path }}"
            content: "{{ extra_vars_payload | to_nice_json }}"
            mode: "0600"
          vars:
            extra_vars_payload:
              github_token: SMOKE-TOKEN
              github_runners_config: "{{ runners_fixture }}"
              github_api_base_url: "http://127.0.0.1:{{ mock_port }}"

        # --list-tasks parses the playbook (implicit syntax check)
        # and emits a deterministic per-play / per-task block we can
        # assert play names and tag wiring against without running
        # anything.
        - name: Capture --list-tasks output for the structural assertions
          ansible.builtin.command:
            argv:
              - ansible-playbook
              - "{{ target_playbook }}"
              - --inventory
              - "{{ inventory_path }}"
              - --extra-vars
              - "@{{ extra_vars_path }}"
              - --list-tasks
          register: list_tasks
          changed_when: false

        - name: Assert the three plays appear in the documented order
          ansible.builtin.assert:
            that:
              - >-
                'Reachability split and controller-side force fan-out'
                in list_tasks.stdout
              - >-
                'Deregister self-hosted GitHub Actions runners on provisioned VMs'
                in list_tasks.stdout
              - >-
                'Surface unreachable-with-registration as one exit code'
                in list_tasks.stdout
              - >-
                list_tasks.stdout.index('Reachability split')
                < list_tasks.stdout.index('Deregister self-hosted')
              - >-
                list_tasks.stdout.index('Deregister self-hosted')
                < list_tasks.stdout.index('Surface unreachable-with-registration')

        - name: Assert each per-VM role import carries its own tag
          ansible.builtin.assert:
            that:
              - "'TAGS: [runner_service]' in list_tasks.stdout"
              - "'TAGS: [runner_registration]' in list_tasks.stdout"
              - "'TAGS: [runner_binary]' in list_tasks.stdout"

        # Behaviour mode A: force=false. Play 3's assert must fire.
        - name: Truncate the mock log before mode A
          ansible.builtin.copy:
            dest: "{{ mock_log }}"
            content: ""
            mode: "0644"

        - name: Run deregister with runners_force_remove unset (expect failure)
          ansible.builtin.command:
            argv:
              - ansible-playbook
              - "{{ target_playbook }}"
              - --inventory
              - "{{ inventory_path }}"
              - --extra-vars
              - "@{{ extra_vars_path }}"
          register: mode_a
          # ansible-playbook is expected to exit non-zero here; we
          # assert the rc explicitly below rather than letting the
          # task fail the play.
          failed_when: false
          changed_when: false

        - name: Assert mode A failed with the expected message
          ansible.builtin.assert:
            that:
              - mode_a.rc != 0
              - "'Unreachable VMs still have GitHub-registered runners' in mode_a.stdout"
              - "'unreachable-vm/runner-on-unreachable' in mode_a.stdout"

        - name: Read the mock log after mode A
          ansible.builtin.slurp:
            src: "{{ mock_log }}"
          register: mode_a_log

        - name: Assert mode A made no DELETE call
          ansible.builtin.assert:
            that:
              - '"\"method\": \"DELETE\"" not in (mode_a_log.content | b64decode)'

        # Behaviour mode B: force=true. Play 3's assert must pass and
        # the unreachable entry's DELETE must have hit the mock.
        - name: Truncate the mock log before mode B
          ansible.builtin.copy:
            dest: "{{ mock_log }}"
            content: ""
            mode: "0644"

        - name: Run deregister with runners_force_remove=true (expect success)
          ansible.builtin.command:
            argv:
              - ansible-playbook
              - "{{ target_playbook }}"
              - --inventory
              - "{{ inventory_path }}"
              - --extra-vars
              - "@{{ extra_vars_path }}"
              - --extra-vars
              - runners_force_remove=true
          register: mode_b
          failed_when: false
          changed_when: false

        - name: Assert mode B passed
          ansible.builtin.assert:
            that:
              - mode_b.rc == 0
              - "'Unreachable VMs still have GitHub-registered runners' not in mode_b.stdout"

        - name: Read the mock log after mode B
          ansible.builtin.slurp:
            src: "{{ mock_log }}"
          register: mode_b_log

        - name: Assert mode B issued the force-path DELETE for the unreachable runner
          ansible.builtin.assert:
            that:
              # The mock assigns id 2 to the second line of the
              # registered-runners file (runner-on-unreachable),
              # which is the only DELETE the force path should
              # issue: runner-on-reachable belongs to a VM that
              # passed the reachability probe and therefore never
              # reaches play 1's fan-out.
              - '"\"method\": \"DELETE\"" in (mode_b_log.content | b64decode)'
              - '"\"runner_id\": \"2\"" in (mode_b_log.content | b64decode)'
              - '"\"runner_id\": \"1\"" not in (mode_b_log.content | b64decode)'

      always:
        # Always-kill so a failed assertion does not leak the mock
        # subprocess (which holds the test port and would break a
        # rerun until the orphan is reaped manually).
        - name: Stop the mock GitHub API
          ansible.builtin.shell: |
            set -eu
            if [[ -f {{ mock_pidfile | quote }} ]]; then
                kill "$(cat {{ mock_pidfile | quote }})" 2>/dev/null || true
                rm -f {{ mock_pidfile | quote }}
            fi
          args:
            executable: /bin/bash
          changed_when: false
