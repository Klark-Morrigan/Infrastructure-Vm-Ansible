---
# Converge - drive playbooks/tasks/_runner-status-one.yml against three
# fixtured runners and assert the verdict each produces:
#   runner-up        unit active   + GitHub online  -> UP
#   runner-svc-down  unit inactive + GitHub online  -> DOWN (service axis)
#   runner-gh-down   unit active   + GitHub absent  -> DOWN (github axis)
#
# The play's report/assert wrapper (playbooks/runner-status.yml) is thin; the
# verdict logic under test lives in the included per-runner file, applied
# here directly so the assertions read runner_status_results on the same
# host (host facts do not cross to a separate verify play).
#
# A fourth assertion covers the egress signal: the VM-side probe is pointed
# at a dead port (see runner_egress_probe_url below), so every verdict's
# egress_reachable reads false - exercising the real probe task hermetically.

- name: Converge - runner-status per-runner verdicts
  hosts: all
  gather_facts: false
  vars:
    github_token: "fake-pat-for-molecule-scenario-only"
    github_api_base_url: "http://127.0.0.1:18082"
    # Point the VM-side egress probe at a port nothing listens on, so it
    # deterministically reads unreachable without any live network: the
    # uri connect fails, status stays -1, egress_reachable -> false. (The
    # default would hit api.github.com for real, which this hermetic
    # scenario must not depend on.) The reachable branch is the trivial
    # complement of the same ternary.
    runner_egress_probe_url: "http://127.0.0.1:9"
    status_entries:
      - vmName: instance
        runnerName: runner-up
        runnerUsername: u-runner
        githubUrl: https://github.com/example/repo-up
      - vmName: instance
        runnerName: runner-svc-down
        runnerUsername: u-runner
        githubUrl: https://github.com/example/repo-svc
      - vmName: instance
        runnerName: runner-gh-down
        runnerUsername: u-runner
        githubUrl: https://github.com/example/repo-gh
  tasks:
    - name: Initialise the verdict accumulator
      ansible.builtin.set_fact:
        runner_status_results: []

    - name: Probe each fixtured runner
      ansible.builtin.include_tasks: ../../../../playbooks/tasks/_runner-status-one.yml
      loop: "{{ status_entries }}"
      loop_control:
        loop_var: entry
        label: "{{ entry.runnerName }}"

    - name: Assert runner-up is UP (service active + GitHub online)
      vars:
        v: >-
          {{ runner_status_results
             | selectattr('runner', 'equalto', 'runner-up') | first }}
      ansible.builtin.assert:
        that:
          - v.service_active
          - v.github_status == 'online'
        fail_msg: "runner-up verdict wrong: {{ v }}"

    - name: Assert runner-svc-down is DOWN on the service axis (inactive + online)
      vars:
        v: >-
          {{ runner_status_results
             | selectattr('runner', 'equalto', 'runner-svc-down') | first }}
      ansible.builtin.assert:
        that:
          - not v.service_active
          - v.github_status == 'online'
        fail_msg: "runner-svc-down verdict wrong: {{ v }}"

    - name: Assert runner-gh-down is DOWN on the github axis (active + absent)
      vars:
        v: >-
          {{ runner_status_results
             | selectattr('runner', 'equalto', 'runner-gh-down') | first }}
      ansible.builtin.assert:
        that:
          - v.service_active
          - v.github_status == 'absent'
        fail_msg: "runner-gh-down verdict wrong: {{ v }}"

    # Egress is a host property: every verdict carries the same cached
    # value, and against the dead probe port that value is false for all.
    # This proves the probe ran on the VM, folded into each verdict, and
    # never aborted the read-only report.
    - name: Assert egress_reachable is reported and false (dead probe port)
      vars:
        egress_values: >-
          {{ runner_status_results | map(attribute='egress_reachable') | list }}
      ansible.builtin.assert:
        that:
          - egress_values | length == 3
          - egress_values | select | list | length == 0
        fail_msg: "egress_reachable should be false for all runners: {{ egress_values }}"
