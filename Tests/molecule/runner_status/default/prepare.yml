---
# Prepare:
#   controller - launch the shared mock GitHub API. Registered set =
#     runner-up + runner-svc-down (GitHub reports them online); runner-gh-down
#     is deliberately absent so the github axis reads 'absent'.
#   container  - install a stub systemctl ahead of the real one on PATH plus
#     two fixture files that drive which runners have a unit and which units
#     are active, so the scenario controls the on-VM service axis without
#     real systemd.

- name: Prepare controller - launch mock GitHub API
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    mock_port: 18082
    mock_pidfile: /tmp/runner-status-mock.pid
    mock_log: /tmp/runner-status-mock.log
    mock_registered_file: /tmp/runner-status-mock-registered.txt
    mock_stderr: /tmp/runner-status-mock.stderr
    mock_script: "{{ playbook_dir }}/../../../mock-github-api.py"
  tasks:
    - name: Kill any leftover mock from a previous run
      ansible.builtin.include_tasks: ../../runner_registration/tasks/_kill-mock-pidfile.yml

    - name: Seed the registered set (runners GitHub reports online)
      ansible.builtin.copy:
        dest: "{{ mock_registered_file }}"
        content: |
          runner-up
          runner-svc-down
        mode: "0644"

    - name: Launch mock + wait for it to accept connections
      ansible.builtin.include_tasks: ../../runner_registration/tasks/_launch-mock.yml

- name: Prepare container - stub systemctl + unit/active fixtures
  hosts: all
  gather_facts: false
  tasks:
    - name: Create the fixture directory
      ansible.builtin.file:
        path: /etc/runner-status-fixture
        state: directory
        mode: "0755"

    # A systemd unit exists for all three; only runner-up and runner-gh-down
    # are active (runner-svc-down's unit is present but inactive -> DOWN on
    # the service axis even though GitHub reports it online).
    - name: Declare which runners have a systemd unit
      ansible.builtin.copy:
        dest: /etc/runner-status-fixture/units-present
        content: |
          runner-up
          runner-svc-down
          runner-gh-down
        mode: "0644"

    - name: Declare which runner units are active
      ansible.builtin.copy:
        dest: /etc/runner-status-fixture/active
        content: |
          runner-up
          runner-gh-down
        mode: "0644"

    # /usr/local/bin precedes /usr/bin on root's PATH, so this shadows the
    # real systemctl for the play's `systemctl list-unit-files` /
    # `systemctl is-active` reads. It honours only those two verbs.
    - name: Install the stub systemctl ahead of the real one on PATH
      ansible.builtin.copy:
        dest: /usr/local/bin/systemctl
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -u
          fixture=/etc/runner-status-fixture
          case "${1:-}" in
            list-unit-files)
              glob="${@: -1}"               # actions.runner.*<name>.service
              name="${glob#actions.runner.\*}"
              name="${name%.service}"
              if grep -qxF "${name}" "${fixture}/units-present" 2>/dev/null; then
                printf 'actions.runner.example-%s.%s.service enabled enabled\n' "${name}" "${name}"
              fi
              exit 0
              ;;
            is-active)
              unit="${2:-}"                 # actions.runner.example-<name>.<name>.service
              name="${unit%.service}"; name="${name##*.}"
              if grep -qxF "${name}" "${fixture}/active" 2>/dev/null; then
                echo active; exit 0
              fi
              echo inactive; exit 3
              ;;
            *) exit 0 ;;
          esac
