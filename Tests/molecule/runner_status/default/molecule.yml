---
# Molecule scenario for the runner-status play (playbooks/runner-status.yml
# via playbooks/tasks/_runner-status-one.yml).
#
# The play's GitHub query delegate_to: localhost, so the mock GitHub API
# lives on the controller (shared Tests/mock-github-api.py, the same mock the
# runner_registration scenarios use). The on-VM systemctl probes hit a stub
# systemctl installed in prepare, so the scenario controls unit-present /
# active state without real systemd.
#
# No side_effect / verify in the sequence: the per-runner verdicts are
# asserted inside converge (host facts do not cross to a separate verify
# play), and the read-only check has no state to mutate between converge and
# the idempotence pass.
#
# `lint` is intentionally absent (molecule 26.x removed molecule.command.lint);
# ansible-lint runs out-of-band via the lint-ansible skill / CI.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # Reuse the runner_service scenarios' baked image (python3 + sudo).
    # Build it once before running:
    #   docker build -t common-ansible/runner-service-systemd:24.04
    #     -f Tests/molecule/runner_service/default/Dockerfile
    #     Tests/molecule/runner_service/default
    image: common-ansible/runner-service-systemd:24.04
    pre_build_image: true
    command: /bin/sleep infinity
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # Same roles_path bridge the runner_registration scenarios document:
    # ANSIBLE_ROLES_PATH (env) supports expansion and wins over ansible.cfg.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - cleanup
    - destroy
