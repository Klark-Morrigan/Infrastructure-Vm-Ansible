---
# Shared fixture-fileserver bring-up for the runner_binary molecule
# scenarios. Included via `ansible.builtin.include_tasks` from each
# scenario's prepare.yml after seeding the scenario-specific runner
# service users.
#
# Why an in-container http server rather than a controller-side one:
# molecule's converge runs ansible against the managed container; the
# role's get_url executes on the container, so the easiest reachable
# server is one bound on the container's own loopback. A controller-
# side server would require -network=host or a bridged container IP,
# both fragile compared to "use 127.0.0.1 in both prepare and converge".
#
# Tarball shape: a single executable config.sh at the archive root.
# The role's register-direction idempotence guard stats config.sh after
# extraction; no other tarball contents matter. The remove direction
# does not even read it; the file is present in the staged tarball
# only because the register direction (which populates the state the
# remove scenario tears down) requires it.
#
# Caller contract (play-level vars the includer must set):
#   fixture_port        - tcp port the http server binds on 127.0.0.1.
#                         Each scenario uses a distinct value so a
#                         concurrent default + remove run cannot
#                         collide.
#   fixture_stage_dir   - directory the http server serves from.
#   fixture_source_dir  - directory the archive build reads config.sh
#                         from.
#   fixture_version     - version string baked into the served
#                         tarball's filename. Must match what the
#                         role's runner_version expects on download.

- name: Create the fixture source directory
  ansible.builtin.file:
    path: "{{ fixture_source_dir }}"
    state: directory
    mode: "0755"

# config.sh is the marker the role's register-direction idempotence
# guard stats after extraction. The contents do not matter; only its
# presence and the +x bit do (no scenario's verify play invokes it).
- name: Stage a stub config.sh inside the tarball source
  ansible.builtin.copy:
    dest: "{{ fixture_source_dir }}/config.sh"
    content: |
      #!/bin/bash
      echo "fake config.sh fixture for runner_binary molecule scenario"
    mode: "0755"

- name: Create the staging directory served by the fixture http server
  ansible.builtin.file:
    path: "{{ fixture_stage_dir }}"
    state: directory
    mode: "0755"

# Build the tarball from the source directory's contents. archive with
# path=<dir>/* would expand the glob on the controller; using the
# directory path with `format: gz` lets the module shell out to tar
# with the right -C dance to keep config.sh at the archive root (which
# is what the role's extract expects).
- name: Build the fake actions-runner tarball
  community.general.archive:
    path: "{{ fixture_source_dir }}/"
    dest: >-
      {{ fixture_stage_dir }}/actions-runner-linux-x64-{{
      fixture_version }}.tar.gz
    format: gz
    mode: "0644"

# nohup + & detaches the listener so molecule's prepare phase can
# complete and converge can proceed. Redirecting stdout / stderr to a
# log file keeps the container's ansible_python_interpreter free of
# background-process output that would confuse the SSH-equivalent
# connection plugin.
- name: Start python http.server serving the staging directory
  ansible.builtin.shell:
    cmd: >-
      nohup python3 -m http.server {{ fixture_port }}
      --bind 127.0.0.1
      --directory {{ fixture_stage_dir }}
      >/var/log/runner-fixture-http.log 2>&1 &
  args:
    executable: /bin/bash
  changed_when: true

# Tight wait-for so a server that died at startup (port already in use,
# etc.) fails the prepare phase loudly rather than letting converge
# hit a connection-refused get_url and obscure the root cause.
- name: Wait for the fixture http server to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ fixture_port }}"
    timeout: 10
