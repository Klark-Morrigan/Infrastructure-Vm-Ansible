---
# Converge: apply the runner_binary role with the positive-path fixtures.
#
# Four entries cover the create-side cases the role's plan entry calls
# out:
#   - instance-runner-a / instance-runner-b: same vmName, same
#     runnerUsername (u-runner-shared). Proves the unique-collapse on
#     the cache loop - exactly one download under
#     /home/u-runner-shared/cache/.
#   - instance-runner-c: same vmName, different runnerUsername
#     (u-runner-other). Proves the per-user split - a second download
#     lands under /home/u-runner-other/cache/.
#   - leak-runner on a different vmName ("other-host"). Proves the
#     selectattr lookup filters correctly: the role's loops must skip
#     this entry on `instance`, so /opt/runners/leak-runner must not
#     exist after converge.
#
# host_file_server_base_url points at the in-container fixture http
# server prepare.yml launched on 127.0.0.1:18745. runner_version is
# pinned to the same value the fixture tarball was named with so the
# role's URL composition resolves to a served file.

- name: Converge - apply runner_binary role
  hosts: all
  gather_facts: false
  vars:
    github_runners_config:
      - vmName: instance
        runnerName: instance-runner-a
        runnerUsername: u-runner-shared
        deployUsername: u-deploy
        githubUrl: https://github.com/example/repo-a
        runnerLabels: [self-hosted, ubuntu, x64]
      - vmName: instance
        runnerName: instance-runner-b
        runnerUsername: u-runner-shared
        deployUsername: u-deploy
        githubUrl: https://github.com/example/repo-b
        runnerLabels: [self-hosted, ubuntu, x64]
      - vmName: instance
        runnerName: instance-runner-c
        runnerUsername: u-runner-other
        deployUsername: u-deploy-other
        githubUrl: https://github.com/example/repo-c
        runnerLabels: [self-hosted, ubuntu, x64]
      - vmName: other-host
        runnerName: leak-runner
        runnerUsername: u-leak
        deployUsername: u-deploy-leak
        githubUrl: https://github.com/example/leak
        runnerLabels: [self-hosted]
    host_file_server_base_url: http://127.0.0.1:18745
    runner_version: "2.999.0"
  tasks:
    - name: Include the role under test
      ansible.builtin.include_role:
        name: runner_binary
