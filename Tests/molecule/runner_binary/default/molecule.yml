---
# Molecule scenario for the runner_binary role.
#
# Same shape as the groups / users scenarios: single Ubuntu 24.04
# container, Docker driver, ansible verifier. The role only manipulates
# the filesystem (get_url, unarchive, file:directory), so a non-systemd
# sleep-infinity container is sufficient.
#
# The fixture HTTP server runs INSIDE the container - prepare.yml stages
# a fake tarball under a serving directory and launches
# `python3 -m http.server` bound to 127.0.0.1 on a fixed high port. The
# role then fetches from that loopback address, so no host-side
# listener is involved (which would not exist on the molecule controller
# anyway). This is a behaviour-equivalent fixture for the real
# production path where _start-host-file-server.ps1 binds on the
# Hyper-V switch IP.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # The bare docker.io/library/ubuntu:24.04 image no longer ships
    # /usr/bin/python3 in its default layer, so the first ansible.builtin
    # task in prepare.yml fails at `/bin/sh: 1: /usr/bin/python3: not
    # found` before there is any chance to apt-install it. The shared
    # Dockerfile at Tests/molecule/runner_binary/Dockerfile bakes
    # python3 + sudo + tar + gzip on top of the base and is used by
    # both the default and remove scenarios via the same image tag;
    # build once via
    #   docker build \
    #       -t infrastructure-vm-ansible/runner-binary-base:24.04 \
    #       -f Tests/molecule/runner_binary/Dockerfile \
    #       Tests/molecule/runner_binary
    # `pre_build_image: true` tells the docker driver to consume the
    # locally-tagged image directly and skip the
    # community.docker.docker_image build path which on this
    # workstation tries the Docker Desktop Windows-side credential
    # helper and fails inside WSL.
    image: infrastructure-vm-ansible/runner-binary-base:24.04
    pre_build_image: true
    command: /bin/sleep infinity
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # ANSIBLE_ROLES_PATH (env) wins over `config_options.defaults.roles_path`
    # (ansible.cfg) and crucially supports env-var expansion plus
    # propagates across every molecule phase. A relative
    # `roles_path:` in ansible.cfg is resolved against the directory the
    # cfg lives in - molecule writes that under
    # /home/<user>/.ansible/tmp/molecule.<id>.<scenario>/, so a relative
    # path bottoms out somewhere under /home, never under the repo.
    # MOLECULE_PROJECT_DIRECTORY points at the molecule cwd (the role's
    # Tests/molecule/runner_binary/ dir per the wsl-task wrapper); three
    # levels up is the repo root, then `roles/` is the standard path.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible
