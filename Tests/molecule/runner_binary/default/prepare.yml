---
# Prepare the container before converge: seed the two runner service
# users this scenario exercises, then bring the fixture http server up
# via the shared `_fixture-fileserver.yml` include (one copy of the
# fixture-server tasks, shared with the remove scenario).
#
# Two runner service users so the scenario covers both the
# shared-user case (one cache download for the two runners that
# share u-runner-shared) and the distinct-user case (a separate
# download under u-runner-other). The remove scenario only needs
# u-runner-shared, so the user seeding stays per-scenario rather than
# pulling into the shared include.

- name: Prepare - seed users, bring fixture fileserver up
  hosts: all
  gather_facts: false
  vars:
    fixture_port: 18745
    fixture_version: "2.999.0"
    fixture_stage_dir: /var/lib/runner-fixture/srv
    fixture_source_dir: /var/lib/runner-fixture/src
  tasks:
    # python3 + sudo + tar + gzip are baked into the scenario's
    # Dockerfile, so prepare does not need an apt-cache refresh or an
    # install task.

    - name: Seed runner service users
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /bin/bash
        create_home: true
        state: present
      loop:
        - u-runner-shared
        - u-runner-other

    - name: Bring the fixture http server up
      ansible.builtin.include_tasks: ../tasks/_fixture-fileserver.yml
