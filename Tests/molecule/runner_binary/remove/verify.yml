---
# Verify post-converge state for the runner_binary remove direction.
#
# Idempotence (re-run reports changed: 0) is checked separately by
# `molecule idempotence` in the default test sequence; this file
# covers the dir-absent + cache-survives + selector-negative state
# assertions.

- name: Verify - runner_binary remove direction post-conditions
  hosts: all
  gather_facts: false
  vars:
    fixture_version: "2.999.0"
  tasks:
    # Both registered runners' extract directories must be gone after
    # the remove direction ran. instance-runner-c was never extracted
    # by prepare, so it was already absent going in - the stat must
    # still report false. The selector-negative runner-leak was never
    # touched by the role and likewise must not have been created.
    - name: Stat /opt/runners/<name>/ for every declared entry
      ansible.builtin.stat:
        path: "/opt/runners/{{ item }}"
      register: extract_dir_stats
      loop:
        - instance-runner-a
        - instance-runner-b
        - instance-runner-c
        - runner-leak
      loop_control:
        label: "{{ item }}"

    - name: Assert every /opt/runners/<name>/ is absent after remove
      ansible.builtin.assert:
        that:
          - >-
            (extract_dir_stats.results | map(attribute='stat.exists') | list)
            == [false, false, false, false]
        fail_msg: >-
          One or more /opt/runners/<name>/ directories survived the
          remove direction:
          {{
            dict(
              extract_dir_stats.results
              | map(attribute='item')
              | zip(
                  extract_dir_stats.results
                  | map(attribute='stat.exists')
                )
            )
          }}

    # The tarball cache file under u-runner-shared's home is the
    # "do not touch the cache" contract: the remove direction
    # exclusively targets /opt/runners/<name>/, never the per-user
    # cache. A regression that hooked the cache into the loop would
    # show up here as a missing stat.
    - name: Stat the u-runner-shared cache tarball
      ansible.builtin.stat:
        path: >-
          /home/u-runner-shared/cache/actions-runner-linux-x64-{{
          fixture_version }}.tar.gz
      register: cache_after_remove

    - name: Assert the tarball cache survived the remove direction
      ansible.builtin.assert:
        that:
          - cache_after_remove.stat.exists
          - cache_after_remove.stat.pw_name == 'u-runner-shared'
        fail_msg: >-
          /home/u-runner-shared/cache/actions-runner-linux-x64-{{
          fixture_version }}.tar.gz is missing after the remove
          direction; the role deleted the shared cache it is
          contractually required to leave alone.

    # The runner service user's home directory itself is owned by the
    # users role's remove direction (feature 03), not by this role's
    # remove direction. Catches a regression that would chase the
    # extract dir up the tree and `state=absent` the home directory.
    - name: Stat /home/u-runner-shared (must still exist)
      ansible.builtin.stat:
        path: /home/u-runner-shared
      register: home_after_remove

    - name: Assert the runner user home directory survived the remove direction
      ansible.builtin.assert:
        that:
          - home_after_remove.stat.exists
        fail_msg: >-
          /home/u-runner-shared was deleted by runner_binary's remove
          direction; the home directory is owned by the users role's
          remove direction (feature 03), not this role.
