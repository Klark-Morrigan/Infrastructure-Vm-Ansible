---
# Molecule scenario for the runner_binary role - remove direction.
#
# Same container shape as the default (register) scenario: bare
# ubuntu:24.04, non-systemd, sleep-infinity, tmpfs on /run and /tmp.
# The remove direction is pure filesystem (one
# ansible.builtin.file: state=absent per entry), so no init / cgroup
# wiring is needed - the constraints that pushed runner_service onto a
# systemd-baked Dockerfile do not apply here.
#
# The scenario lives outside Tests/roles/ for the same reason as the
# default scenario: ansible-lint's `var-naming[no-role-prefix]` rule
# would otherwise scan verify.yml.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # See the default scenario's molecule.yml for the rationale; same
    # python3-baked image, same pre_build_image flow. Single shared
    # Dockerfile at Tests/molecule/runner_binary/Dockerfile.
    image: infrastructure-vm-ansible/runner-binary-base:24.04
    pre_build_image: true
    command: /bin/sleep infinity
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # ANSIBLE_ROLES_PATH (env) wins over `config_options.defaults.roles_path`
    # (ansible.cfg) and propagates across every molecule phase - prepare,
    # converge, verify. The `config_options.defaults.roles_path` form is
    # written into a generated ansible.cfg under
    # /home/<user>/.ansible/tmp/molecule.<id>.<scenario>/ and a relative
    # path there bottoms out under /home, never under the repo. Prepare
    # `include_role`s runner_binary to stand the register state up, so
    # roles_path has to be resolvable in the prepare phase too - the
    # env-var form is the one that gets it there.
    # MOLECULE_PROJECT_DIRECTORY points at the molecule cwd (the role's
    # Tests/molecule/runner_binary/ dir per the wsl-task wrapper); three
    # levels up is the repo root, then `roles/` is the standard path.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible
