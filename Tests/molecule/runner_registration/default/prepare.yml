---
# Two-stage prepare:
#   1. Controller-side: launch the shared mock GitHub API
#      (Tests/mock-github-api.py) on 127.0.0.1:<port>. The mock is the
#      assertion surface for the verify play - it logs every request
#      as a JSON line.
#   2. Container-side: install python3 + sudo, seed two runner service
#      users, lay out /opt/runners/<name>/ for each entry with a stub
#      config.sh, and pre-seed .runner markers for the healthy and
#      re-register cases. The stub config.sh records its argv to a
#      per-runner log the verify play reads.

- name: Prepare controller - launch mock GitHub API
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    mock_port: 18080
    mock_pidfile: /tmp/runner-registration-mock.pid
    mock_log: /tmp/runner-registration-mock.log
    mock_registered_file: /tmp/runner-registration-mock-registered.txt
    mock_stderr: /tmp/runner-registration-mock.stderr
    # Shared mock, single source for both molecule (this scenario
    # plus ../remove/) and the deregister smoke playbook under
    # Tests/ansible/. Path is relative to this scenario directory.
    mock_script: "{{ playbook_dir }}/../../../mock-github-api.py"
  tasks:
    - name: Kill any leftover mock server from a previous run
      ansible.builtin.include_tasks: ../tasks/_kill-mock-pidfile.yml

    # Initial registered set is just runner-healthy: the runner that
    # mirrors a fully-converged state on disk + on GitHub. The mock
    # re-reads this file on every GET so side_effect.yml can extend
    # it between the converge and idempotence runs.
    - name: Seed the registered-runners file with the initial state
      ansible.builtin.copy:
        dest: "{{ mock_registered_file }}"
        content: |
          runner-healthy
        mode: "0644"

    - name: Launch mock + wait for it to accept connections
      ansible.builtin.include_tasks: ../tasks/_launch-mock.yml

- name: Prepare container - users, runner directories, stub config.sh
  hosts: all
  gather_facts: false
  vars:
    # Three entries cover the three reconcile branches. runner-healthy
    # already has its .runner; runner-fresh has no marker; runner-
    # reregister has a marker that does not match GitHub (the mock
    # leaves it absent from /actions/runners until side_effect fixes
    # that for the idempotence run).
    runner_dirs:
      - name: runner-healthy
        user: u-runner-shared
        has_marker: true
      - name: runner-fresh
        user: u-runner-shared
        has_marker: false
      - name: runner-reregister
        user: u-runner-other
        has_marker: true
  tasks:
    # python3 + sudo are baked into the shared molecule image (see
    # Tests/molecule/runner_service/default/Dockerfile); no apt
    # round-trip needed here.
    #
    # Two users so the scenario also exercises the per-user become_user
    # boundary the role's config.sh tasks rely on (u-runner-shared
    # owns runner-healthy + runner-fresh; u-runner-other owns
    # runner-reregister).
    - name: Seed runner service users
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /bin/bash
        create_home: true
        state: present
      loop:
        - u-runner-shared
        - u-runner-other

    - name: Create per-runner extract directory
      ansible.builtin.file:
        path: "/opt/runners/{{ item.name }}"
        state: directory
        owner: "{{ item.user }}"
        group: "{{ item.user }}"
        mode: "0755"
      loop: "{{ runner_dirs }}"
      loop_control:
        label: "{{ item.name }}"

    # Stub config.sh stands in for the real actions/runner config.sh.
    # It records every invocation's argv as a JSON line to a per-
    # runner log, and on `--unattended` writes the .runner marker the
    # role's on-disk probe stats (delete on `remove`). The path
    # discovery uses os.path.basename(dirname) so a single template
    # works for every runner directory.
    - name: Install stub config.sh in each runner directory
      ansible.builtin.copy:
        dest: "/opt/runners/{{ item.name }}/config.sh"
        owner: "{{ item.user }}"
        group: "{{ item.user }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json
          import os
          import sys

          here = os.path.dirname(os.path.abspath(__file__))
          name = os.path.basename(here)
          log = "/var/log/runner-" + name + "-config.log"
          marker = os.path.join(here, ".runner")

          with open(log, "a", encoding="utf-8") as fh:
              fh.write(json.dumps({"argv": sys.argv[1:]}) + "\n")

          if sys.argv[1:2] == ["remove"]:
              try:
                  os.unlink(marker)
              except FileNotFoundError:
                  pass
          else:
              with open(marker, "w", encoding="utf-8") as fh:
                  fh.write(json.dumps({"argv": sys.argv[1:]}))

          sys.exit(0)
      loop: "{{ runner_dirs }}"
      loop_control:
        label: "{{ item.name }}"

    # Pre-seed .runner where the scenario calls for it. healthy ->
    # markers present + GitHub registered -> skip branch. re-register
    # -> marker present + GitHub absent -> remove + re-register. fresh
    # gets no marker (the role will create it via the stub).
    - name: Seed .runner marker for healthy / re-register cases
      ansible.builtin.copy:
        dest: "/opt/runners/{{ item.name }}/.runner"
        owner: "{{ item.user }}"
        group: "{{ item.user }}"
        mode: "0644"
        content: |
          {"agentId": 1, "agentName": "{{ item.name }}", "seeded_by": "prepare"}
      when: item.has_marker
      loop: "{{ runner_dirs }}"
      loop_control:
        label: "{{ item.name }}"

    # Empty per-runner config.sh logs up front so the verify play can
    # `slurp` them unconditionally without a "file not found" branch.
    # Owner is the matching runner service user because the stub
    # config.sh runs under `become_user: <runnerUsername>` and would
    # otherwise hit `PermissionError: [Errno 13]` appending to a
    # root-owned log file.
    - name: Initialise per-runner config.sh logs as empty files
      ansible.builtin.copy:
        dest: "/var/log/runner-{{ item.name }}-config.log"
        owner: "{{ item.user }}"
        group: "{{ item.user }}"
        content: ""
        mode: "0644"
        force: true
      loop: "{{ runner_dirs }}"
      loop_control:
        label: "{{ item.name }}"
