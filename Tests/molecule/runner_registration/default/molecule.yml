---
# Molecule scenario for the runner_registration role.
#
# Same Docker / Ubuntu 24.04 shape as the runner_binary scenario, with
# one structural difference: the role's GitHub REST calls run
# `delegate_to: localhost`, so the mock GitHub API has to live on the
# controller (where Ansible's localhost connection lands), not inside
# the managed container. prepare.yml's first play launches the mock
# on the controller via `connection: local`; converge sets
# `github_api_base_url` to that loopback URL; cleanup.yml kills the
# mock pidfile-tracked process.
#
# Custom test_sequence: we replace the stock `idempotence` slot with
# `side_effect -> idempotence` because a static GitHub mock cannot
# observe `config.sh --unattended` writing a registration the way
# real GitHub does. side_effect.yml mutates the mock's
# registered-runners file to reflect the post-converge reality
# (every fresh / re-register runner is now known to GitHub), then
# molecule's idempotence step re-converges and asserts 0 changes.
# Skipping idempotence entirely would lose the natural-state
# idempotence guarantee the role does honour in production.
#
# `lint` is intentionally absent: molecule 26.x removed the
# `molecule.command.lint` action and dropped `- lint` from the stock
# scenario template. ansible-lint runs out-of-band via
# `scripts/run-tests.sh` / the `lint-ansible` skill / CI, matching
# modern molecule's "lint outside the test sequence" posture. Adding
# it back to test_sequence fails container create with
# `ModuleNotFoundError: No module named 'molecule.command.lint'`.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # Reuse the runner_service scenarios' baked image: it already
    # ships python3 + sudo (the only two prerequisites this scenario
    # needs; systemd / systemd-sysv are unused here because
    # `command:` is /bin/sleep, not /sbin/init). Bare
    # docker.io/library/ubuntu:24.04 ships without python3, so any
    # ansible.builtin.* task would fail with `/usr/bin/python3: not
    # found` against the unmodified base. Build the image once via
    #   docker build -t common-ansible/runner-service-systemd:24.04
    #       -f Tests/molecule/runner_service/default/Dockerfile
    #       Tests/molecule/runner_service/default
    # before running the scenario. `pre_build_image: true` consumes
    # the locally-tagged image directly and skips the
    # community.docker.docker_image build path which on this
    # workstation tries the Docker Desktop Windows-side credential
    # helper and fails inside WSL with `OSError: [Errno 8] Exec
    # format error: '/usr/bin/docker-credential-desktop.exe'`.
    image: common-ansible/runner-service-systemd:24.04
    pre_build_image: true
    command: /bin/sleep infinity
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # ANSIBLE_ROLES_PATH (env) wins over `config_options.defaults.roles_path`
    # (ansible.cfg) and crucially supports env-var expansion. A relative
    # `roles_path:` in ansible.cfg is resolved against the directory the
    # cfg lives in - molecule writes that under
    # /home/<user>/.ansible/tmp/molecule.<id>.<scenario>/, so a
    # relative path bottoms out somewhere under /home, never under the
    # repo. MOLECULE_PROJECT_DIRECTORY points at the molecule cwd (the
    # role's Tests/molecule/<role>/ dir per the wsl-task wrapper); three
    # levels up is the repo root, then `roles/` is the standard path.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - side_effect
    - idempotence
    - verify
    - cleanup
    - destroy
