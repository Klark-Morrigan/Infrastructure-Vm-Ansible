---
# Converge - apply runner_registration's remove direction against three
# declared entries:
#
#   runner-removable  on `instance`    - present in the mock's
#                                        registered set -> remove
#                                        branch fires: mint removal
#                                        token, run config.sh remove
#                                        --unattended.
#   runner-orphan     on `instance`    - absent from the mock ->
#                                        skip branch fires: no token
#                                        mint, no config.sh call.
#   runner-leak       on `other-host`  - selector negative: the
#                                        runner_entry_resolve filter
#                                        must drop this entry on
#                                        `instance` so the mock never
#                                        sees /repos/example/repo-leak.
#
# include_role { tasks_from: remove } (not import_role) for the same
# reason the runner_service remove scenario documents: import_role
# resolves at parse-time against the syntax-check inventory's roles
# search path, which does not honour molecule's relative roles_path
# override; include_role defers resolution to runtime when the
# override is in effect. The deregister-runners playbook (step 5)
# uses import_role because it runs against the real repo layout where
# roles/ sits on the standard search path.

- name: Converge - apply runner_registration role (remove direction)
  hosts: all
  gather_facts: false
  vars:
    github_runners_config:
      - vmName: instance
        runnerName: runner-removable
        runnerUsername: u-runner-shared
        deployUsername: u-deploy
        githubUrl: https://github.com/example/repo-removable
        runnerLabels: [self-hosted, ubuntu, x64]
      - vmName: instance
        runnerName: runner-orphan
        runnerUsername: u-runner-other
        deployUsername: u-deploy-other
        githubUrl: https://github.com/example/repo-orphan
        runnerLabels: [self-hosted, ubuntu]
      - vmName: other-host
        runnerName: runner-leak
        runnerUsername: u-leak
        deployUsername: u-deploy-leak
        githubUrl: https://github.com/example/repo-leak
        runnerLabels: [self-hosted]
    github_token: "fake-pat-for-molecule-scenario-only"
    github_api_base_url: "http://127.0.0.1:18081"
  tasks:
    - name: Include the role under test (remove direction)
      ansible.builtin.include_role:
        name: runner_registration
        tasks_from: remove
