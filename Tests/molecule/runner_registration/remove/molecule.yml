---
# Molecule scenario for the runner_registration role - remove direction.
#
# Same controller-side-mock shape as the default scenario: the role's
# GitHub REST calls `delegate_to: localhost`, so the mock GitHub API
# lives on the controller. The mock script is the repo-wide shared
# Tests/mock-github-api.py (single source for both molecule
# scenarios and the deregister smoke playbook) so the wire contract
# for /actions/runners, /actions/runners/remove-token, and the
# force-path DELETE stays locked in one place.
#
# Custom test_sequence: idempotence is preceded by `side_effect` which
# clears the mock's registered-runners file. Without that, the
# converge run would call config.sh remove on the registered entry,
# but the static mock would still report it registered on the
# idempotence pass, and the role would re-call config.sh remove and
# report changed: 2 - a fixture-side artefact, not a real
# idempotence regression. side_effect mirrors what real GitHub would
# do after a successful config.sh remove (drop the registration).
#
# `lint` is intentionally absent: molecule 26.x removed the
# `molecule.command.lint` action and dropped `- lint` from the stock
# scenario template. ansible-lint runs out-of-band via
# `scripts/run-tests.sh` / the `lint-ansible` skill / CI, matching
# modern molecule's "lint outside the test sequence" posture. Adding
# it back to test_sequence fails container create with
# `ModuleNotFoundError: No module named 'molecule.command.lint'`.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # Reuse the runner_service scenarios' baked image: it already
    # ships python3 + sudo (the only two prerequisites this scenario
    # needs; systemd / systemd-sysv are unused here because
    # `command:` is /bin/sleep, not /sbin/init). One image, two
    # scenario directories - cheaper inner loop, one place to update
    # when the base bumps. Build it once via
    #   docker build -t infrastructure-vm-ansible/runner-service-systemd:24.04
    #       -f Tests/molecule/runner_service/default/Dockerfile
    #       Tests/molecule/runner_service/default
    # before running the scenario. `pre_build_image: true` consumes
    # the locally-tagged image directly and skips the
    # community.docker.docker_image build path which on this
    # workstation tries the Docker Desktop Windows-side credential
    # helper and fails inside WSL with `OSError: [Errno 8] Exec
    # format error: '/usr/bin/docker-credential-desktop.exe'`.
    image: infrastructure-vm-ansible/runner-service-systemd:24.04
    pre_build_image: true
    command: /bin/sleep infinity
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # ANSIBLE_ROLES_PATH (env) wins over `config_options.defaults.roles_path`
    # (ansible.cfg) and crucially supports env-var expansion. A relative
    # `roles_path:` in ansible.cfg is resolved against the directory the
    # cfg lives in - molecule writes that under
    # /home/<user>/.ansible/tmp/molecule.<id>.<scenario>/, so a
    # relative path bottoms out somewhere under /home, never under the
    # repo. MOLECULE_PROJECT_DIRECTORY points at the molecule cwd (the
    # role's Tests/molecule/<role>/ dir per the wsl-task wrapper); three
    # levels up is the repo root, then `roles/` is the standard path.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - side_effect
    - idempotence
    - verify
    - cleanup
    - destroy
