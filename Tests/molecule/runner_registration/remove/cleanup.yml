---
# Stop the controller-side mock GitHub API and clean up its scratch
# files. Runs at the end of each `molecule test` sequence (and again
# at the start of the next, defensively, via the test_sequence in
# molecule.yml). Idempotent: missing pidfile or already-dead process
# are no-ops.

- name: Cleanup - stop controller-side mock GitHub API
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    mock_pidfile: /tmp/runner-registration-remove-mock.pid
    mock_log: /tmp/runner-registration-remove-mock.log
    mock_registered_file: /tmp/runner-registration-remove-mock-registered.txt
    mock_stderr: /tmp/runner-registration-remove-mock.stderr
  tasks:
    - name: Kill mock server if its pidfile points at a live process
      ansible.builtin.include_tasks: ../tasks/_kill-mock-pidfile.yml

    - name: Remove mock scratch files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ mock_pidfile }}"
        - "{{ mock_log }}"
        - "{{ mock_registered_file }}"
        - "{{ mock_stderr }}"
