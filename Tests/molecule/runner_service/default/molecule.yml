---
# Molecule scenario for the runner_service role.
#
# Unlike the binary / registration scenarios, this one needs a real
# systemd-as-PID-1 inside the container: the role under test calls
# `systemctl list-unit-files`, `ansible.builtin.systemd`, and
# `systemctl is-active`, none of which behave usefully against a
# /bin/sleep entrypoint. ubuntu:24.04 ships /usr/sbin/init (systemd)
# in its base image, so exec'ing init directly under privileged +
# cgroup mounts gives a working systemd without a custom image.
#
# The privileged + cgroup setup is the same pattern used by every
# upstream systemd-in-docker recipe (geerlingguy/docker-ubuntu-ansible,
# the Ansible docs' systemd container example): cgroupns_mode: host
# so the container shares the host's cgroup namespace, the cgroup
# tmpfs bind so the container can manipulate its own cgroup, and
# tmpfs for /run + /run/lock + /tmp so systemd's startup state has
# a writable home.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    # The bare docker.io/library/ubuntu:24.04 base image no longer ships
    # systemd or any /sbin/init binary, so a `command: /sbin/init`
    # against it fails at container create with `stat /sbin/init: no
    # such file or directory`. The Dockerfile in this scenario directory
    # installs systemd + systemd-sysv + sudo + python3 on top of the
    # base; build it once via `docker build -t
    # infrastructure-vm-ansible/runner-service-systemd:24.04
    # -f Tests/molecule/runner_service/<scenario>/Dockerfile <ctx>`
    # before running the scenario (see Tests/molecule/runner_service/
    # README.md or repeat the build inline). `pre_build_image: true`
    # tells the molecule docker driver to consume the locally-tagged
    # image directly and skip the community.docker.docker_image build
    # path, which on this workstation tries the Docker Desktop
    # Windows-side credential helper and fails inside WSL with
    # `OSError: [Errno 8] Exec format error:
    # '/usr/bin/docker-credential-desktop.exe'`.
    image: infrastructure-vm-ansible/runner-service-systemd:24.04
    pre_build_image: true
    command: /sbin/init
    privileged: true
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    # ANSIBLE_ROLES_PATH (env) wins over `config_options.defaults.roles_path`
    # (ansible.cfg) and crucially supports env-var expansion. A relative
    # `roles_path:` in ansible.cfg is resolved against the directory the
    # cfg lives in - molecule writes that under
    # /home/<user>/.ansible/tmp/molecule.<id>.<scenario>/, so a
    # relative path bottoms out somewhere under /home, never under the
    # repo. MOLECULE_PROJECT_DIRECTORY points at the molecule cwd (the
    # role's Tests/molecule/<role>/ dir per the wsl-task wrapper); three
    # levels up is the repo root, then `roles/` is the standard path.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../../../roles"
  config_options:
    defaults:
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible
