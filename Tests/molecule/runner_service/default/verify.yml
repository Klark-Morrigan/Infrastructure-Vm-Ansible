---
# Verify post-converge state for the runner_service role.
#
# Idempotence (the re-run reports changed: 0) is checked separately by
# `molecule idempotence` in the default test sequence; this file covers
# state assertions and the selector negative case.

- name: Verify - runner_service role post-conditions
  hosts: all
  gather_facts: false
  tasks:
    # Every declared runner on `instance` has a matching unit file.
    # The role's probe runs the same glob; if the unit is missing the
    # install branch left work undone.
    - name: Stat the unit file for each declared runner
      ansible.builtin.stat:
        path: >-
          /etc/systemd/system/actions.runner.example-repo.{{
          item }}.service
      register: unit_stats
      loop:
        - runner-install
        - runner-active
        - runner-stopped
      loop_control:
        label: "{{ item }}"

    - name: Assert every declared runner has its unit file
      ansible.builtin.assert:
        that:
          - >-
            (unit_stats.results | map(attribute='stat.exists') | list)
            == [true, true, true]
        fail_msg: >-
          One or more runner units is missing under
          /etc/systemd/system:
          {{ unit_stats.results | map(attribute='stat.exists') | list }}

    # is-active per declared runner. The role's re-check asserts the
    # same condition; verifying again here proves the active state
    # survived past the role's own assertion (a unit that activated
    # then immediately failed would surface as the next is-active
    # returning something other than 'active').
    - name: Capture systemctl is-active for each declared runner  # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          systemctl is-active
          actions.runner.example-repo.{{ item }}.service
      register: active_checks
      loop:
        - runner-install
        - runner-active
        - runner-stopped
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Assert every declared runner service is active
      ansible.builtin.assert:
        that:
          - (item.stdout | trim) == 'active'
        fail_msg: >-
          Runner unit
          actions.runner.example-repo.{{ item.item }}.service is not
          active (systemctl is-active reported
          '{{ item.stdout | trim }}').
      loop: "{{ active_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    # Selector negative: the runner-leak entry was declared on a
    # different vmName and must not have produced a unit on `instance`.
    # A leaked unit file would mean runner_entry_resolve's selectattr
    # let an out-of-host entry through.
    - name: Stat the leak runner's unit (must not exist)
      ansible.builtin.stat:
        path: >-
          /etc/systemd/system/actions.runner.example-repo-leak.runner-leak.service
      register: leak_unit_stat

    - name: Assert runner-leak did not leak onto this host
      ansible.builtin.assert:
        that:
          - not leak_unit_stat.stat.exists
        fail_msg: >-
          /etc/systemd/system/actions.runner.example-repo-leak.runner-leak.service
          exists; the runner_entry_resolve selectattr let an entry for
          vmName=other-host through.

    # Glob check on the unit-file listing: only the three declared
    # units exist; no leak unit was registered under any other name
    # pattern either. Catches a future stub change that might rename
    # the unit prefix in a way the path-stat above would miss.
    - name: List installed actions.runner units  # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          systemctl list-unit-files
          --type=service --no-pager --no-legend
          'actions.runner.*'
      register: actions_runner_units
      changed_when: false

    - name: Assert exactly the three declared units are installed
      ansible.builtin.assert:
        that:
          - actions_runner_units.stdout_lines | length == 3
          - >-
            (actions_runner_units.stdout_lines
             | join(' ') | regex_search('runner-leak')) is none
        fail_msg: >-
          Unexpected actions.runner unit set after converge:
          {{ actions_runner_units.stdout_lines }}
