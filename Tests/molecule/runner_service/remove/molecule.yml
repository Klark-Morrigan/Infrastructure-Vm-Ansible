---
# Molecule scenario for the runner_service role - remove direction.
#
# Same systemd-as-PID-1 container setup as the default (register)
# scenario: privileged + cgroup mounts + tmpfs for /run /run/lock /tmp,
# /usr/sbin/init as the entrypoint. The remove direction calls the
# same systemctl surface (`list-unit-files` via the shared
# `_probe-unit.yml`, plus `ansible.builtin.systemd state=stopped
# enabled=false`), and svc.sh uninstall ends with daemon-reload, so a
# real systemd init is required here for the same reason.
#
# The scenario lives outside Tests/roles/ for the same reason as the
# default scenario: ansible-lint's `var-naming[no-role-prefix]` would
# otherwise scan verify.yml's role-prefixed facts.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    image: docker.io/library/ubuntu:24.04
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  config_options:
    defaults:
      # Roles live three levels above the scenario; point Ansible at
      # the repo's roles/ directory so include_role: name=runner_service
      # resolves the role (and its meta dependency on
      # runner_entry_resolve) without copying files into the scenario.
      roles_path: ../../../../roles
      stdout_callback: yaml
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      instance:
        ansible_user: root

verifier:
  name: ansible
