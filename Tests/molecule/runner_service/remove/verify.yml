---
# Verify post-converge state for the runner_service remove direction.
#
# Idempotence (re-run reports changed: 0) is checked separately by
# `molecule idempotence` in the default test sequence; this file
# covers post-teardown state assertions plus the selector negative.

- name: Verify - runner_service remove direction post-conditions
  hosts: all
  gather_facts: false
  tasks:
    # Every entry whose unit was installed in prepare must no longer
    # have a unit file under /etc/systemd/system after converge.
    - name: Stat the unit file for each previously-installed runner
      ansible.builtin.stat:
        path: >-
          /etc/systemd/system/actions.runner.example-repo.{{
          item }}.service
      register: unit_stats
      loop:
        - runner-active
        - runner-stopped
      loop_control:
        label: "{{ item }}"

    - name: Assert every previously-installed unit file is gone
      ansible.builtin.assert:
        that:
          - >-
            (unit_stats.results | map(attribute='stat.exists') | list)
            == [false, false]
        fail_msg: >-
          One or more runner unit files survived the remove direction
          under /etc/systemd/system:
          {{ unit_stats.results | map(attribute='stat.exists') | list }}

    # systemctl is-active for the previously-installed units must
    # report inactive (or "unknown" / "failed" - any non-active state
    # is acceptable; the unit is gone). The role's stop branch is what
    # guarantees this even if the unit-file removal lagged.
    - name: Capture systemctl is-active for prior runners  # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          systemctl is-active
          actions.runner.example-repo.{{ item }}.service
      register: active_checks
      loop:
        - runner-active
        - runner-stopped
      loop_control:
        label: "{{ item }}"
      changed_when: false
      failed_when: false

    - name: Assert every previously-installed service is no longer active
      ansible.builtin.assert:
        that:
          - (item.stdout | trim) != 'active'
        fail_msg: >-
          Runner unit
          actions.runner.example-repo.{{ item.item }}.service still
          reports active after the remove direction (systemctl
          is-active reported '{{ item.stdout | trim }}').
      loop: "{{ active_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    # runner-absent: a unit was never installed in prepare; converge
    # must not have produced one either. Catches a future bug where
    # the role's remove direction would somehow install a unit on the
    # skip path (e.g. mis-firing the install branch from main.yml).
    - name: Stat the runner-absent unit file (must not exist)
      ansible.builtin.stat:
        path: >-
          /etc/systemd/system/actions.runner.example-repo.runner-absent.service
      register: absent_unit_stat

    - name: Assert runner-absent never produced a unit file
      ansible.builtin.assert:
        that:
          - not absent_unit_stat.stat.exists
        fail_msg: >-
          /etc/systemd/system/actions.runner.example-repo.runner-absent.service
          exists; the remove direction must not produce a unit file on
          the skip path.

    # Selector negative: the runner-leak entry was declared on
    # vmName=other-host and must not have landed on `instance` (the
    # default-direction scenario relies on the same assertion). A
    # leaked unit-file here would mean runner_entry_resolve's
    # selectattr let the entry through on the remove path too.
    - name: Stat the leak runner's unit (must not exist)
      ansible.builtin.stat:
        path: >-
          /etc/systemd/system/actions.runner.example-repo-leak.runner-leak.service
      register: leak_unit_stat

    - name: Assert runner-leak did not leak onto this host
      ansible.builtin.assert:
        that:
          - not leak_unit_stat.stat.exists
        fail_msg: >-
          /etc/systemd/system/actions.runner.example-repo-leak.runner-leak.service
          exists; the runner_entry_resolve selectattr let an entry for
          vmName=other-host through.

    # Glob check on the unit-file listing: after the remove direction
    # there should be zero `actions.runner.*` units left on the host.
    # Catches a stray-unit bug the per-name stats above might miss.
    - name: List installed actions.runner units  # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          systemctl list-unit-files
          --type=service --no-pager --no-legend
          'actions.runner.*'
      register: actions_runner_units
      changed_when: false

    - name: Assert no actions.runner units remain installed
      ansible.builtin.assert:
        that:
          - actions_runner_units.stdout_lines | length == 0
        fail_msg: >-
          Unexpected actions.runner units remain installed after the
          remove direction: {{ actions_runner_units.stdout_lines }}
