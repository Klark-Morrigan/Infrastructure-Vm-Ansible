---
# Reconcile the actions/runner tarball cache and per-runner extracted
# directory on the target VM for every github_runners_config entry whose
# vmName matches inventory_hostname.
#
# Two task groups, mirroring how the existing PowerShell flow splits the
# work:
#   1. Tarball cache - one get_url per distinct runnerUsername on the
#      host. The cache lives under each runner-service user's $HOME so
#      ownership is right from creation and so multiple runners sharing
#      the same service user collapse to a single download.
#   2. Per-runner extract - one unarchive per entry into
#      /opt/runners/<runnerName>/. Idempotence guard: stat the runner's
#      config.sh marker; only extract when absent (matches today's
#      "extract only when absent" guarantee).
#
# host_file_server_base_url is supplied by the bash bridge from the
# Windows-side HTTP listener bound to the Hyper-V switch IP - the
# measured NAT-bypass win we refuse to regress (problem.md / Solution
# approach). runner_version is resolved once per invocation by the same
# bridge; defaults/main.yml falls back to "latest" so molecule scenarios
# can drive the role against a known fixture URL without staging the
# real bridge.

# vm_runner_entries is set by roles/runner_entry_resolve (pulled in via
# meta dep; runs once per play). Consumer tasks read it directly.

# The role stamps group: {{ runnerUsername }} on every file it manages,
# including the tarball the download task below fetches UNPRIVILEGED
# (become_user the runner user). A non-root user can only chgrp to a group it
# belongs to, so each runner user must own a same-named primary group - the
# per-user-group model problem.md assumes. That model normally falls out of
# useradd's implicit per-user group, but a target whose useradd defaults new
# users into a shared group (e.g. `users`) breaks it, and the unprivileged
# chgrp then fails. Establish the invariant explicitly here rather than
# trusting the target's useradd default: ensure the group exists and is the
# user's PRIMARY group. A primary group is not touched by the users role's
# `append: false` supplementary reconciliation, so it survives a later
# create-users run; once it holds, every file the runner creates defaults to
# its own group and no chgrp is needed.
- name: Ensure a per-runner primary group exists for each runner user
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  become: true
  loop: "{{ vm_runner_entries | map(attribute='runnerUsername') | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Make each runner user's per-runner group its primary group
  ansible.builtin.user:
    name: "{{ item }}"
    group: "{{ item }}"
  become: true
  loop: "{{ vm_runner_entries | map(attribute='runnerUsername') | unique | list }}"
  loop_control:
    label: "{{ item }}"

# Create the per-user cache directory before get_url runs. get_url's
# dest-as-directory branch requires the directory to exist; creating it
# here keeps ownership right (the cache must be writable by the runner
# service user that get_url becomes below) without relying on an
# implicit useradd side-effect.
- name: Ensure tarball cache directory exists for each runner user
  ansible.builtin.file:
    path: "/home/{{ item }}/cache"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0755"
  become: true
  loop: "{{ vm_runner_entries | map(attribute='runnerUsername') | unique | list }}"
  loop_control:
    label: "{{ item }}"

# Idempotence probe for the cache. A separate stat lets the get_url task
# below short-circuit cleanly on re-runs without download attempts (and
# without get_url's own conditional-fetch heuristics, which would still
# round-trip to the listener for headers).
- name: Stat the runner tarball in each runner-user's cache
  ansible.builtin.stat:
    path: >-
      /home/{{ item }}/cache/actions-runner-linux-x64-{{
      runner_version }}.tar.gz
  loop: "{{ vm_runner_entries | map(attribute='runnerUsername') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  register: runner_binary_cache_stats

# Download path is the host file server bound by _start-host-file-server.ps1.
# become_user the runner service user so the downloaded file lands owned by
# the same account that owns the runner directory tree (avoids a second
# chown step). Skipped when the cache stat reports the tarball already
# present.
- name: Download runner tarball from host file server (per runner user)
  ansible.builtin.get_url:
    url: >-
      {{ host_file_server_base_url }}/actions-runner-linux-x64-{{
      runner_version }}.tar.gz
    dest: >-
      /home/{{ item.item }}/cache/actions-runner-linux-x64-{{
      runner_version }}.tar.gz
    owner: "{{ item.item }}"
    group: "{{ item.item }}"
    mode: "0644"
  become: true
  become_user: "{{ item.item }}"
  loop: "{{ runner_binary_cache_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists

# The per-runner extract directory must exist before unarchive runs
# (unarchive does not create missing parent paths). Owner is the runner
# service user so the extracted file ownership and the directory
# ownership match.
- name: Ensure per-runner extract directory exists
  ansible.builtin.file:
    path: "/opt/runners/{{ item.runnerName }}"
    state: directory
    owner: "{{ item.runnerUsername }}"
    group: "{{ item.runnerUsername }}"
    mode: "0755"
  become: true
  loop: "{{ vm_runner_entries }}"
  loop_control:
    label: "{{ item.runnerName }}"

# Marker probe: config.sh is the file the actions/runner tarball lays at
# its root, so its presence inside /opt/runners/<name>/ proves a prior
# extract completed. Stat-then-conditional-unarchive is the cleanest
# expression of "extract only on cache miss" - unarchive's own creates:
# argument would work too but is harder to read alongside the cache
# probe above.
- name: Stat the per-runner extract marker (config.sh)
  ansible.builtin.stat:
    path: "/opt/runners/{{ item.runnerName }}/config.sh"
  loop: "{{ vm_runner_entries }}"
  loop_control:
    label: "{{ item.runnerName }}"
  register: runner_binary_extract_stats

# remote_src: true tells unarchive the src is already on the managed
# host (the cache file we just downloaded), so no controller-side
# tarball copy occurs. owner/group apply to extracted contents.
- name: Extract runner tarball into per-runner directory
  ansible.builtin.unarchive:
    src: >-
      /home/{{ item.item.runnerUsername }}/cache/actions-runner-linux-x64-{{
      runner_version }}.tar.gz
    dest: "/opt/runners/{{ item.item.runnerName }}/"
    remote_src: true
    owner: "{{ item.item.runnerUsername }}"
    group: "{{ item.item.runnerUsername }}"
  become: true
  loop: "{{ runner_binary_extract_stats.results }}"
  loop_control:
    label: "{{ item.item.runnerName }}"
  when: not item.stat.exists
