---
# Role metadata. Same posture as roles/groups, roles/users, and
# roles/sudoers: the galaxy_info block is here to satisfy ansible-lint's
# role-name / meta-no-info rules, not to publish to Galaxy.

galaxy_info:
  role_name: runner_binary
  author: Infrastructure-VM-Ansible
  description: >-
    Reconcile the actions/runner tarball cache and per-runner extracted
    directory on a target VM from the GitHubRunnersConfig vault entries.
    First role in the register-runners play; runs before
    runner_registration so config.sh exists on disk when the GitHub
    registration step looks for it.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - ci
    - githubactions

# Only dependency: the runner_entry_resolve helper, which sets the
# shared `vm_runner_entries` fact this role's loops read. Declaring it
# here means standalone `--tags runner_binary` runs still resolve the
# host slice correctly.
#
# runner_registration / runner_service are intentionally NOT meta-deps
# here. The same trap from features 02 / 03 applies: Ansible's meta deps
# always run the dep's tasks/main.yml and ignore the entry role's
# tasks_from selector, so a meta dep would silently re-run the
# register direction during a future deregister play that imports
# runner_binary with tasks_from: remove. Ordering is owned by
# playbooks/register-runners.yml (runner_binary -> runner_registration
# -> runner_service) and the symmetric deregister play in feature 09.
dependencies:
  - role: runner_entry_resolve
