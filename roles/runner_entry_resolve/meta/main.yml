---
# Role metadata. galaxy_info present only to satisfy ansible-lint's
# role-name / meta-no-info rules; this is a repo-internal helper, not a
# Galaxy-published role.

galaxy_info:
  role_name: runner_entry_resolve
  author: Common-Ansible
  description: >-
    Resolve the GitHubRunnersConfig slice for the current host into the
    shared `vm_runner_entries` fact. Consumed via meta dependency by
    roles/runner_binary, roles/runner_registration, and
    roles/runner_service; replaces the per-role selectattr+filter each
    of those roles would otherwise carry.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - ci
    - githubactions

# No dependencies of its own; this role is the bottom of the chain.
dependencies: []
