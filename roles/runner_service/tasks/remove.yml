---
# Remove direction for the runner_service role (problem.md / Role:
# runner_service, feature 09 / Step 2). Tears down the systemd surface
# laid by the register direction:
#
#   1. Unit probe   - same shared `_probe-unit.yml` the register
#                     direction uses; populates `runner_service_unit_probes` per entry.
#                     An empty stdout for an entry means no unit was
#                     installed on this host (already torn down, or
#                     never installed) - both branches below skip that
#                     entry.
#   2. Stop branch  - ansible.builtin.systemd with state=stopped,
#                     enabled=false. Stock module idempotence makes
#                     already-stopped / already-disabled a no-op.
#   3. Uninstall    - svc.sh uninstall removes the unit file from
#                     /etc/systemd/system. svc.sh resolves the runner
#                     root via $(pwd), so chdir is the contract (same
#                     as the install branch in main.yml).
#
# Runs before runner_registration's remove direction (the deregister
# playbook lists `runner_service -> runner_registration -> runner_binary`):
# a running runner process can hold .credentials open and race
# `config.sh remove`, so the unit must be quiesced before the next role
# touches anything.

- name: Probe for the systemd unit file (per runner)
  ansible.builtin.include_tasks: _probe-unit.yml

- name: Stop and disable the runner service
  ansible.builtin.systemd:
    name: "{{ item.stdout | trim }}"
    state: stopped
    enabled: false
  become: true
  loop: "{{ runner_service_unit_probes.results }}"
  loop_control:
    label: "{{ item.item.runnerName }}"
  when: (item.stdout | trim) | length > 0

# svc.sh uninstall removes the unit file under /etc/systemd/system, so
# become: true is required (same reason as the install branch). cmd
# form mirrors the install branch shape - chdir pins the cwd so
# svc.sh's `$(pwd)` self-locate resolves to the per-runner extract dir.
- name: Uninstall the runner systemd unit
  ansible.builtin.command:
    cmd: "./svc.sh uninstall"
    chdir: "/opt/runners/{{ item.item.runnerName }}"
  become: true
  loop: "{{ runner_service_unit_probes.results }}"
  loop_control:
    label: "{{ item.item.runnerName }}"
  when: (item.stdout | trim) | length > 0
  changed_when: true
