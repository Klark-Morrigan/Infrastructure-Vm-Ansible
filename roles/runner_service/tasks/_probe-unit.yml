---
# Per-host systemd unit probe shared by both directions.
#
# `systemctl list-unit-files` accepts glob patterns and prints one line
# per match plus a trailing summary; --no-legend strips the summary so
# awk + head can pull the unit name cleanly when present and yield empty
# stdout when absent. The role's reconcile decisions (install branch in
# the register direction, stop/uninstall guard in the remove direction)
# both key off the same stdout shape, so the probe lives here and is
# included from both tasks/main.yml and tasks/remove.yml to avoid drift.
#
# The glob filters by the runnerName suffix only - parsing owner/repo
# out of githubUrl to pin the prefix would duplicate work the next
# probe and the systemd / svc.sh tasks already no-op against.
#
# shell (not command) because the pipe to awk + head is part of the
# contract.
- name: Probe for the systemd unit file (per runner)
  # All continuation lines stay at the base indentation. YAML folded
  # scalars (>-) preserve newlines verbatim on more-indented lines,
  # which the bash -c parser then sees as real line breaks - the
  # second `--type=service` token would be parsed as a fresh command.
  ansible.builtin.shell: >-
    set -o pipefail;
    { systemctl list-unit-files
    --type=service --no-pager --no-legend
    'actions.runner.*{{ item.runnerName }}.service'
    || true; }
    | awk 'NR==1 { print $1; exit }'
  # /bin/sh on Debian / Ubuntu is dash, which does not understand
  # `set -o pipefail`. Force bash so the pipefail contract above
  # actually applies (the probe's failure mode is silent stdout, so
  # without pipefail a broken systemctl would still appear "empty"
  # and the install branch would mis-fire).
  #
  # awk 'NR==1 { print $1; exit }' replaces the older `awk | head -n1`
  # for the same first-line semantics without the SIGPIPE risk: `head`
  # closes its stdin after reading one line, which under pipefail makes
  # the upstream `systemctl` exit non-zero (rc 141) on any host where
  # the matching unit set has more than one line of output.
  #
  # `{ systemctl ... || true; }` neutralises systemctl's exit code for
  # the absence case: modern systemd returns rc=1 when the glob matches
  # no unit files, which under pipefail would fail the probe for any
  # runner whose unit was never installed (the legitimate "absent" path
  # both directions consume). `|| true` collapses that into rc=0 and
  # empty stdout; pipefail still catches a genuine awk failure.
  args:
    executable: /bin/bash
  loop: "{{ vm_runner_entries }}"
  loop_control:
    label: "{{ item.runnerName }}"
  register: runner_service_unit_probes
  changed_when: false
  # noqa command-instead-of-shell - pipe to awk is the contract
