---
# Role metadata. galaxy_info present only to satisfy ansible-lint's
# role-name / meta-no-info rules; this role is not Galaxy-published.
# Same posture as roles/runner_binary, roles/runner_registration, and
# roles/runner_entry_resolve.

galaxy_info:
  role_name: runner_service
  author: Common-Ansible
  description: >-
    Reconcile the systemd service for a self-hosted GitHub Actions
    runner. Third role in the register-runners play; runs after
    runner_registration (which lays config.sh + .runner on disk - both
    are required for svc.sh install to succeed) and is the last step
    before the runner reports online to GitHub.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - ci
    - githubactions

# Only dependency: the runner_entry_resolve helper that sets the shared
# vm_runner_entries fact this role's loops read. Same posture as
# runner_binary / runner_registration: declaring the dep here lets
# standalone `--tags runner_service` runs still resolve the host slice
# without the caller pre-populating the fact.
#
# runner_binary and runner_registration are intentionally NOT meta-deps
# here (same trap as features 02 / 03): Ansible's meta deps always run
# the dep's tasks/main.yml and ignore the entry role's tasks_from
# selector, so a meta dep would silently re-run the register direction
# during a future deregister play that imports runner_service with
# tasks_from: remove. Order is owned by
# playbooks/register-runners.yml (runner_binary -> runner_registration
# -> runner_service) and the symmetric deregister play in feature 09.
dependencies:
  - role: runner_entry_resolve
