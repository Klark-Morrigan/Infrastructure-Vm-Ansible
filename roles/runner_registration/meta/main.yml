---
# Role metadata. galaxy_info present only to satisfy ansible-lint's
# role-name / meta-no-info rules; this role is not Galaxy-published.
# Same posture as roles/runner_binary and roles/runner_entry_resolve.

galaxy_info:
  role_name: runner_registration
  author: Common-Ansible
  description: >-
    Reconcile a self-hosted GitHub Actions runner's registration state
    against the GitHub repo and the on-disk .runner marker. Second role
    in the register-runners play; runs after runner_binary (which lays
    config.sh on disk) and before runner_service (which needs the
    runner to be registered before svc.sh install can succeed).
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - ci
    - githubactions

# Only dependency: the runner_entry_resolve helper that sets the shared
# vm_runner_entries fact this role's loops read. Same posture as
# runner_binary: declaring the dep here lets standalone
# `--tags runner_registration` runs still resolve the host slice without
# the caller pre-populating the fact.
#
# runner_binary and runner_service are intentionally NOT meta-deps here
# (same trap as features 02 / 03): Ansible's meta deps always run the
# dep's tasks/main.yml and ignore the entry role's tasks_from selector,
# so a meta dep would silently re-run the register direction during a
# future deregister play that imports runner_registration with
# tasks_from: remove. Order is owned by
# playbooks/register-runners.yml (runner_binary -> runner_registration
# -> runner_service) and the symmetric deregister play in feature 09.
dependencies:
  - role: runner_entry_resolve
