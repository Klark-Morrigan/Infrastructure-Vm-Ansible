---
# Shared removal-token mint, included by:
#   - tasks/reconcile-entry.yml  (register direction, re-register branch)
#   - tasks/_remove-one.yml      (remove direction)
#
# Both call sites need a short-lived removal token to drive
# `config.sh remove`. Removal tokens expire in 1 hour, so the mint
# sits immediately before the config.sh call in each caller. POST to
# `.../actions/runners/remove-token` returns 201 with `{ token,
# expires_at }`; status_code: 201 guards against a regression to a
# 200 / 204 contract that would let the role accept a bogus body.
#
# Auth header is fixed to `token <PAT>` (never URL query, which would
# survive in proxy access logs); the whole task is `no_log: true` so
# neither the PAT nor the minted token ever lands at any verbosity.
#
# Caller guards the include with its own `when:` (the boolean drives
# whether the entry is registered on GitHub) - this file unconditionally
# performs the mint when reached, and the resulting fact
# `runner_registration_remove_token_resp` is consumed by the caller's
# subsequent `config.sh remove` task within the same per-entry scope.
- name: Mint a short-lived removal token
  ansible.builtin.uri:
    url: >-
      {{ github_api_base_url }}/repos/{{ runner_registration_entry_owner
      }}/{{ runner_registration_entry_repo }}/actions/runners/remove-token
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    status_code: 201
    return_content: true
  delegate_to: localhost
  register: runner_registration_remove_token_resp
  no_log: true
