---
# Per-runner reconcile, included once per vm_runner_entries item from
# tasks/main.yml. Each fact is scoped to the current entry via set_fact;
# the next iteration overwrites them before any consumer reads them.
#
# Branching summary (matches problem.md / Reconcile branches):
#   runner_registration_should_register
#       = not on disk OR not on GitHub
#   runner_registration_should_remove_first
#       = on disk AND not on GitHub
#
# The remove_first branch is the re-register path: a stale local
# registration (config.sh laid .runner down but GitHub no longer knows
# the runner) needs an explicit `config.sh remove --token <removal>`
# before `config.sh --unattended` will accept a fresh registration.

# Owner/repo parse + GitHub existence probe live in _probe-github.yml
# so the remove direction can include the same probe surface. Sets
# `runner_registration_entry_owner`, `runner_registration_entry_repo`,
# and the `runner_registration_on_github` boolean the reconcile
# decision below reads. The same three facts are scoped to this
# entry's include and overwritten on the next iteration before any
# downstream task reads them.
- name: Probe GitHub for existing registration of this runner
  ansible.builtin.include_tasks: _probe-github.yml

# On-disk probe. .runner is the marker config.sh --unattended writes
# at the runner directory root after a successful registration; its
# presence is the canonical "this runner already configured itself"
# signal monolithprojects.github_actions_runner also uses.
- name: Stat the on-disk registration marker
  ansible.builtin.stat:
    path: "/opt/runners/{{ entry.runnerName }}/.runner"
  register: runner_registration_marker_stat

# Reconcile decision. Two booleans drive the four tasks below; computing
# them in one set_fact keeps the conditions on those tasks short and
# their guard logic self-evident at the call site.
- name: Decide reconcile branch for this runner
  ansible.builtin.set_fact:
    runner_registration_on_disk: "{{ runner_registration_marker_stat.stat.exists }}"
    runner_registration_should_register: >-
      {{ (not runner_registration_marker_stat.stat.exists)
         or (not runner_registration_on_github) }}
    runner_registration_should_remove_first: >-
      {{ runner_registration_marker_stat.stat.exists
         and (not runner_registration_on_github) }}

# Mint the removal token via the shared _mint-remove-token.yml so the
# URI contract (URL, headers, status_code) cannot drift between the
# re-register branch here and the remove direction's main mint. The
# included file sets `runner_registration_remove_token_resp` in the
# per-entry scope; the `when:` here is the only branch this caller
# adds.
- name: Mint a removal token for the re-register branch
  ansible.builtin.include_tasks: _mint-remove-token.yml
  when: runner_registration_should_remove_first

# Run `config.sh remove --token <removal>` as the runner service user
# to clear a stale local registration. become_user (not root) so the
# files config.sh touches keep the runner-user ownership runner_binary
# established. argv form (not shell string) so the token never reaches
# a shell history file. changed_when: true because config.sh has
# side effects every time we invoke it; suppressing changed would lie
# about what the role did.
- name: Run config.sh remove (re-register branch)
  ansible.builtin.command:
    argv:
      - ./config.sh
      - remove
      - --token
      - "{{ runner_registration_remove_token_resp.json.token }}"
    chdir: "/opt/runners/{{ entry.runnerName }}"
  become: true
  become_user: "{{ entry.runnerUsername }}"
  changed_when: true
  no_log: true
  when: runner_registration_should_remove_first

# Mint the registration token. Same controller-side delegate; same
# no_log; same status_code: 201. The registration token differs from
# the removal token (different endpoint, different scope) so each
# branch mints its own rather than trying to share one.
- name: Mint a registration token
  ansible.builtin.uri:
    url: >-
      {{ github_api_base_url }}/repos/{{ runner_registration_entry_owner
      }}/{{ runner_registration_entry_repo }}/actions/runners/registration-token
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    status_code: 201
    return_content: true
  delegate_to: localhost
  register: runner_registration_token_resp
  no_log: true
  when: runner_registration_should_register

# Run `config.sh --unattended` to write .runner and register the
# runner with GitHub. The four documented flags (--url, --token,
# --name, --labels) match the problem.md contract. runnerLabels is
# joined with `,` because the actions/runner CLI takes a comma-
# separated list. argv form keeps the token out of any shell history;
# no_log keeps it out of Ansible's own output.
- name: Run config.sh --unattended (register branch)
  ansible.builtin.command:
    argv:
      - ./config.sh
      - --unattended
      - --url
      - "{{ entry.githubUrl }}"
      - --token
      - "{{ runner_registration_token_resp.json.token }}"
      - --name
      - "{{ entry.runnerName }}"
      - --labels
      - "{{ entry.runnerLabels | join(',') }}"
    chdir: "/opt/runners/{{ entry.runnerName }}"
  become: true
  become_user: "{{ entry.runnerUsername }}"
  changed_when: true
  no_log: true
  when: runner_registration_should_register
