---
# Role metadata. Kept minimal: this role is consumed only by the
# repo-local create-users playbook, not published to Galaxy, so the
# galaxy_info block exists to satisfy ansible-lint's role-name /
# meta-no-info rules without committing to a public contract.

galaxy_info:
  role_name: groups
  author: Infrastructure-VM-Ansible
  description: >-
    Reconcile declared OS groups on a target VM from the VmUsersConfig
    vault entry for the host. First role in the create-users play; runs
    before users so primary and supplementary groups exist when
    ansible.builtin.user is invoked.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - users
    - groups

# Only dependency: the vm_users_entry helper, which sets the shared
# `vm_users_entry` fact this role's loop reads. Declaring it here (not
# just in the playbook) means running this role on its own
# (e.g. --tags groups, or include_role from another play) still
# resolves the host slice correctly. The create-users playbook
# (step 12) orders groups -> users -> sudoers explicitly; users / sudoers
# are intentionally NOT meta-deps here - declaring them would invert
# the relationship and make standalone use of groups impossible.
dependencies:
  - role: vm_users_entry
