name: Infrastructure-E2E

# Calls the shared E2E workflow in Infrastructure-E2E as a required PR check.
# Mirrors the Vm-Users gating shape: this repo cannot merge Ansible changes
# to master without the lifecycle layer (provisioning + users + runner)
# proving the new code still produces a working, online runner. This repo
# owns BOTH ansible layers (create-users.sh and register-runners.sh), so it
# pins the ansible scenario via flow-spec. It matches the shared workflow's
# default today; pinning it keeps this repo's PR on the ansible path even if
# that default ever changes.
#
# The shared workflow handles the GitHub App token mint and the deployment
# poll. secrets: inherit forwards the upstream GH_APP_* secrets so the
# token mint succeeds in this caller context.
on:
  pull_request:

jobs:
  e2e:
    uses: Klark-Morrigan/Infrastructure-E2E/.github/workflows/e2e.yml@master
    secrets: inherit
    with:
      flow-spec: '{"usersFlow":"ansible","runnersFlow":"ansible"}'
