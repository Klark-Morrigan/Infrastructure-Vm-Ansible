# Delegates to the shared bash CI workflow in Common-Automation. It
# shellchecks production bash (.github/actions/), runner bash
# (scripts/), and git hooks; verifies the +x bit on every tracked
# *.sh; and runs every *.bats suite under the repo. Empty surfaces
# auto-skip with ::notice::, so this single wiring covers the repo
# from today's scaffold (only ops/_bootstrap-controller-wsl.sh) through
# every later feature that adds bats coverage.
name: Common-Automation

on:
  pull_request:
  workflow_dispatch:

jobs:
  ci-bash:
    uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-bash.yml@master
