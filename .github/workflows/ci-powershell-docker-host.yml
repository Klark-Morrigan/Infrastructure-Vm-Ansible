# Delegates to the shared Docker host CI workflow in Common-PowerShell.
# Runs PowerShell integration tests inside a Docker container, with the
# hosted runner driving the test process directly (the "host" model).
# The shared workflow scans Tests/Integration.DockerHost and no-ops until
# this repo adds tests there. Kept as a local file so the pull_request
# trigger works for PRs in this repo.
name: ci-powershell-docker-host

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ci-powershell-docker-host:
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/ci-powershell-docker-host.yml@master
