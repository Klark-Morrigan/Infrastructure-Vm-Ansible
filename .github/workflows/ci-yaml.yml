# CI for this repo's YAML and Ansible surfaces. Delegates to the
# reusable workflow in GitHub-Common, which runs four lint jobs in
# parallel: actionlint, action-validator, yamllint, ansible-lint.
# Each job auto-skips when its target surface is absent, so this
# single one-line wiring serves every stage of the repo's growth -
# from today's scaffold (no playbooks yet) through every later
# feature.
name: ci-yaml

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ci-yaml:
    uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-yaml.yml@master
