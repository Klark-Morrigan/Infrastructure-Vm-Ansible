# Delegates to the shared Docker target CI workflow in Common-PowerShell.
# Tests run on the hosted runner and connect via SSH to a Docker container
# (the "target" model), so the test process needs Docker access. The shared
# workflow scans Tests/Integration.DockerTarget and no-ops until this repo
# adds tests there. Kept as a local file so the pull_request trigger works
# for PRs in this repo.
name: ci-powershell-docker-target

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ci-powershell-docker-target:
    uses: VitaliiAndreev/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master
