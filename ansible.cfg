# Ansible configuration for the VM-Ansible controller.
#
# Rationale for each setting below — keep this short and intentional.
#
# IMPORTANT: this file is human-readable documentation of the canonical
# settings; it is NOT what Ansible actually loads at runtime. The repo
# lives on a /mnt/c drvfs mount whose Windows ACLs surface as 0777 in
# WSL, which Ansible treats as a config-injection risk and refuses to
# load any cfg from. The bridge (ops/_run-playbook.sh) instead sources
# ops/_ansible-env.sh which exports the equivalent `ANSIBLE_*` env vars
# directly - those bypass the cfg loader entirely. See _ansible-env.sh
# for the full diagnosis. Every key here must have a matching export
# there, and vice versa.

[defaults]
# Inventory is generated per-invocation by the bash bridge (see step 3)
# into a tmpdir; this placeholder keeps `ansible-playbook` happy when run
# manually against a static file dropped under inventory/ during
# development. The bridge always passes `-i <tmpdir>/hosts.yml` explicitly
# at runtime, which overrides this default.
inventory = inventory

# Repo-local roles live under roles/ at the repo root, not under
# playbooks/roles/ - so Ansible's default search path (which prepends
# <playbook_dir>/roles) misses them and `roles: [{ role: groups }]`
# in playbooks/create-users.yml fails with "role 'groups' was not
# found". The bridge `cd`s into the repo root before invoking
# ansible-playbook (see _run-playbook.sh), so a bare `roles` resolves
# correctly. Molecule scenarios bypass this by setting roles_path in
# their own molecule.yml; the production playbook relies on this
# config-level default.
roles_path = roles

# Let Ansible pick the remote Python without printing a warning per host.
# Target VMs are Ubuntu cloud images where `auto_silent` resolves cleanly.
interpreter_python = auto_silent

# Disable host key checking. VMs are short-lived and inventory IPs come
# from the VmProvisioner vault, not user input — there is no static
# known_hosts to compare against and prompting would break unattended runs.
host_key_checking = False

# Keep the retry-file noise out of the repo root. The .gitignore already
# excludes *.retry, but anchoring the path makes the intent explicit.
retry_files_enabled = False

[ssh_connection]
# Disable known_hosts entirely. E2E provisions fresh VMs at recycled
# IPs; once a host key gets recorded on the first run, the next
# provision presents a different key for the same IP and ssh refuses
# to connect with "REMOTE HOST IDENTIFICATION HAS CHANGED".
# host_key_checking=False above only adds StrictHostKeyChecking=no,
# which silently accepts unknown hosts but still refuses changed
# ones. Pointing UserKnownHostsFile at /dev/null is what makes every
# connection look like first-contact, so a recycled IP never trips
# the mismatch check. -C, ControlMaster, and ControlPersist preserve
# Ansible's upstream ssh_args defaults (connection multiplexing); we
# extend rather than replace.
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
